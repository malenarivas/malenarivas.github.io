clear

// DISPLAY DAMAGE GIVEN/RECIEVED
developer "1"
con_filter_text "Damage"
con_filter_text_out "Player:"
con_filter_enable "2"

// DISPLAY DOT WHILE SHOOTING (change FIRST 0 to 1 to activate)
alias "+attack_dot" "+attack; r_cleardecals"
alias "-attack_dot" "-attack; r_cleardecals"

alias "+clear_decal" "+attack2; r_cleardecals"
alias "-clear_decal" "-attack2; r_cleardecals"

// BINDS
bind "mouse1" "+attack_dot"
bind "mouse2" "+clear_decal"
bind "3" "slot3"
bind "mouse4" "slot3"
bind "mwheeldown" "+jump"
bind "mwheelup" "+jump"
bind "t" "+spray_menu"
bind "b" "buymenu"
bind "r" "+reload"
bind "1" "slot1"
bind "2" "slot2"
bind "mouse5" "use weapon_c4"
bind "z""use weapon_smokegrenade"
bind "c" "use weapon_hegrenade"
bind "x" "use weapon_flashbang"
bind "4" "use weapon_decoy"
bind "alt" "use weapon_molotov; use weapon_incgrenade; +cl_show_team_equipment"
bind "f" "+lookatweapon; r_cleardecals"
bind "leftarrow" "+left"
bind "rightarrow" "+right"

// BUY BINDS
cl_use_opens_buy_menu "0"
bind "kp_end" "buy smokegrenade"
bind "kp_downarrow" "buy molotov; buy incgrenade"
bind "kp_pgdn" "buy hegrenade"
bind "kp_ins" "buy flashbang"

// HEADPHONES COMMANDS
voice_enable "1"
cl_mute_enemy_team "0"

// VIEWMODEL COMMANDS
cl_viewmodel_shift_left_amt "0.500000"
cl_viewmodel_shift_right_amt "0.250000"
viewmodel_fov "68"
viewmodel_offset_x "2.5"
viewmodel_offset_y "2.0"
viewmodel_offset_z "-2.0"
viewmodel_presetpos "0"
viewmodel_recoil "1.0"
cl_bob_lower_amt "5.000000"
cl_bobamt_lat "0.100000"
cl_bobamt_vert "0.100000"
cl_bobcycle "0.98"

// CROSSHAIR COMMANDS
cl_crosshair_drawoutline "0"
cl_crosshair_dynamic_maxdist_splitratio "0.1"
cl_crosshair_dynamic_splitalpha_innermod "1"
cl_crosshair_dynamic_splitalpha_outermod "0.5"
cl_crosshair_dynamic_splitdist "3"
cl_crosshair_friendly_warning "1"
cl_crosshair_outlinethickness "0.483573"
cl_crosshair_sniper_show_normal_inaccuracy "0"
cl_crosshair_sniper_width "2"
cl_crosshair_t "0"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshaircolor_b "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "0"
cl_crosshairdot "0"
cl_crosshairgap "-1.146817"
cl_crosshairgap_useweaponvalue "0"
cl_crosshairsize "1.912047"
cl_crosshairstyle "4"
cl_crosshairthickness "0.600000"
cl_crosshairusealpha "1"
cl_fixedcrosshairgap "-6"


// HUD COMMANDS (1=white, 6=orange, 7=yellow, 8=green, 5=red)
cl_hud_color "8"
hud_showtargetid "1"
safezonex "0.90"
safezoney "0.75"
hud_scaling "0.85"
cl_hud_background_alpha "0.950000"
cl_hud_bomb_under_radar "1"
cl_hud_healthammo_style "0"
cl_hud_playercount_pos "0"
cl_hud_playercount_showcount "1"
cl_hud_radar_scale "1.050000"
hud_takesshots "0"
net_graph "1"
net_graphpos "1"
net_graphproportionalfont "0"
cl_showpos "0"
cl_autowepswitch "0"
cl_teamid_overhead_always "1"

// OTHER COMMANDS
snd_mix_async "1"
cl_disablehtmlmotd "1"
cl_showfps "0"
fps_max "121" 
cl_autohelp "0"
cl_forcepreload "1"
r_drawtracers_firstperson "1"

// FINALIZING CONFIG
host_writeconfig
clear
echo "host_writeconfig"
echo "autoexec.cfg has been successfully executed"